services:
  cli-proxy-api:
    image: ${CLI_PROXY_API_IMAGE:-eceasy/cli-proxy-api:latest}
    pull_policy: ${CLI_PROXY_API_PULL_POLICY:-always}
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
      MANAGEMENT_PASSWORD: ${MANAGEMENT_PASSWORD:-${CONSOLE_KEY:-my-secret-key}}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:${CLI_PROXY_AUTH_CONTAINER_PATH:-/root/.cli-proxy-api}
      - ${CLI_PROXY_AUTH_PATH:-./auths}:${CLI_PROXY_AUTHDIR_MIRROR_PATH:-/root/.cli-proxy-api}
      - ${CLI_PROXY_USAGE_PATH:-${CLI_PROXY_AUTH_PATH:-./auths}.usage}:${CLI_PROXY_USAGE_CONTAINER_PATH:-${CLI_PROXY_AUTH_CONTAINER_PATH:-/root/.cli-proxy-api}.usage}
      - ${CLI_PROXY_USAGE_PATH:-${CLI_PROXY_AUTH_PATH:-./auths}.usage}:${CLI_PROXY_AUTHDIR_MIRROR_PATH:-/root/.cli-proxy-api}.usage
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    restart: unless-stopped

  cli-console:
    image: ${CLI_CONSOLE_IMAGE:-cli-console:local}
    pull_policy: ${CLI_CONSOLE_PULL_POLICY:-never}
    build:
      context: .
      dockerfile: Dockerfile
      target: console
    container_name: cli-console
    depends_on:
      - cli-proxy-api
    environment:
      CONSOLE_API_KEY: ${CONSOLE_API_KEY:-${MANAGEMENT_PASSWORD:-${CONSOLE_KEY:-my-secret-key}}}
    command: ["./cli-console", "--api", "cli-proxy-api:8317", "--config", "/CLIProxyAPI/config.yaml", "--port", "8318"]
    ports:
      - "8318:8318"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml:ro
    restart: unless-stopped
